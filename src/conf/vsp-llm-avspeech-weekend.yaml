# @package _group_
#
# Weekend AVSpeech fine-tuning config for single T4 GPU (16GB).
# Encoder frozen throughout (freeze_finetune_updates=999999).
# 3000 updates = ~19 epochs over ~1,272 training segments.
# Effective batch size 8 via gradient accumulation (update_freq=[8]).
#
# Based on vsp-llm-avspeech-finetune.yaml with adjustments:
#   - Single GPU: distributed_world_size=1, nprocs_per_node=1
#   - Gradient accumulation: update_freq=[8]
#   - Shorter schedule: max_update=3000
#   - Conservative lr: 0.0003 (vs 0.0005)
#   - Encoder frozen: freeze_finetune_updates=999999
#   - Frequent checkpoints: save_interval_updates=500
#
# Usage:
#   source /home/ubuntu/vsp-llm-yoad-venv/bin/activate
#   export PYTHONPATH="/home/ubuntu/VSP-LLM/fairseq:$PYTHONPATH"
#   fairseq-hydra-train --config-dir /home/ubuntu/VSP-LLM/src/conf \
#     --config-name vsp-llm-avspeech-weekend \
#     common.user_dir=/home/ubuntu/VSP-LLM/src \
#     task.data=/home/ubuntu/finetune_data \
#     task.label_dir=/home/ubuntu/finetune_data \
#     task.llm_ckpt_path=/home/ubuntu/VSP-LLM/checkpoints/Llama-2-7b-hf \
#     model.w2v_path=/home/ubuntu/VSP-LLM/checkpoints/large_vox_iter5.pt \
#     model.llm_ckpt_path=/home/ubuntu/VSP-LLM/checkpoints/Llama-2-7b-hf \
#     checkpoint.finetune_from_model=/home/ubuntu/VSP-LLM/checkpoints/checkpoint_finetune.pt \
#     checkpoint.reset_optimizer=true \
#     checkpoint.reset_lr_scheduler=true \
#     checkpoint.reset_meters=true \
#     checkpoint.reset_dataloader=true \
#     hydra.run.dir=/home/ubuntu/finetune_output \
#     distributed_training.distributed_world_size=1 \
#     distributed_training.nprocs_per_node=1 \
#     optimization.update_freq='[8]'

common:
  fp16: true
  log_format: json
  log_interval: 50
  tensorboard_logdir: tblog
  seed: 1337
  user_dir: ???

checkpoint:
  save_interval: 1
  keep_interval_updates: 5
  save_interval_updates: 500
  no_epoch_checkpoints: true
  best_checkpoint_metric: accuracy
  maximize_best_checkpoint_metric: true

distributed_training:
  ddp_backend: no_c10d
  find_unused_parameters: true
  distributed_world_size: 1
  nprocs_per_node: 1

task:
  _name: vsp_llm_training
  is_s2s: true
  data: ???
  label_dir: ???
  normalize: true
  labels: ["wrd"]
  single_target: true
  fine_tuning: true
  stack_order_audio: 4
  max_sample_size: 500
  modalities: ["video"]
  image_aug: true
  pad_audio: true
  random_crop: false
  llm_ckpt_path: ???

dataset:
  num_workers: 0
  validate_after_updates: 0
  validate_interval: 1
  train_subset: train
  valid_subset: test
  batch_size: 1

criterion:
  _name: decoder_only_language_modeling_loss
  report_accuracy: true
  label_smoothing: 0.1

optimization:
  max_update: 3000
  lr: [0.0003]
  sentence_avg: true
  update_freq: [8]

optimizer:
  _name: adam
  adam_betas: (0.9,0.98)
  adam_eps: 1e-08

lr_scheduler:
  _name: tri_stage
  warmup_steps: 600
  hold_steps: 0
  decay_steps: 2400
  final_lr_scale: 0.05

model:
  _name: vsp_llm
  w2v_path: ???
  llm_ckpt_path: ???
  apply_mask: false
  mask_selection: static
  mask_length: 10
  mask_other: 0
  mask_prob: 0.75
  mask_channel_selection: static
  mask_channel_length: 64
  mask_channel_other: 0
  mask_channel_prob: 0.5
  layerdrop: 0.1
  dropout: 0.0
  activation_dropout: 0.1
  attention_dropout: 0.0
  feature_grad_mult: 1.0
  encoder_embed_dim: 1024
  decoder_embed_dim: 4096
  freeze_finetune_updates: 999999


hydra:
  job:
    config:
      override_dirname:
        kv_sep: "-"
        item_sep: "__"
        exclude_keys:
          - run
          - task.data
          - task.label_dir
          - model.w2v_path
          - dataset.train_subset
          - dataset.valid_subset
          - criterion.wer_kenlm_model
          - criterion.wer_lexicon
  run:
    dir: ???
  sweep:
    dir: ???
    subdir: ${hydra.job.config_name}__${hydra.job.override_dirname}
